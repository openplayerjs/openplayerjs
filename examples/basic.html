<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OpenPlayerJS — Auto-discovery: built-in HLS + Ads</title>
  <link rel="stylesheet" href="/packages/player/dist/openplayer.css" />
  <style>
    body { background: #111; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    #wrap { width: 100%; max-width: 854px; }
  </style>
</head>
<body>
  <div id="wrap">
    <video id="player" class="op-player__media" controls playsinline muted>
      <source
        src="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
        type="application/x-mpegURL"
      />
    </video>
  </div>

  <script type="importmap">
    {
      "imports": {
        "@openplayerjs/core":   "/packages/core/dist/index.js",
        "@openplayerjs/player": "/packages/player/dist/index.js",
        "@openplayerjs/hls":    "/packages/hls/dist/index.js",
        "@openplayerjs/ads":    "/packages/ads/dist/index.js"
      }
    }
  </script>
  <script type="module">
    import { Core } from '@openplayerjs/core';
    import { HlsMediaEngine } from '@openplayerjs/hls';
    import { AdsPlugin } from '@openplayerjs/ads';
    import { createUI, buildControls } from '@openplayerjs/player';
    import { vastSkippablePreroll } from './ad-tags.js';

    const media = document.querySelector('#player');
    const core = new Core(media, {
      plugins: [
        // HLS engine (priority 50) wins over the built-in DefaultMediaEngine (priority 0)
        // for .m3u8 sources on non-Safari browsers.
        new HlsMediaEngine({ enableWorker: true, lowLatencyMode: true }),
        new AdsPlugin({
          sources: [{ type: "VAST", src: vastSkippablePreroll() }]
        })
      ]
    });


    createUI(core, media, buildControls({
      top: ['progress'],
      'bottom-left': ['play', 'time', 'volume'],
      'bottom-right': ['settings', 'fullscreen'],
    }));
  </script>
</body>
</html>
