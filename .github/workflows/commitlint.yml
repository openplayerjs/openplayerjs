on:
  pull_request:
    branches: ['**']

name: Commitlint

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  commitlint:
    name: Enforce Conventional Commits
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint commit messages
        env:
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          # Lint only commits that are genuinely unique to this PR branch by
          # using the true merge-base of the base branch and PR head.
          # This avoids flagging commits that were squash-merged into master
          # and are only reachable via merge commits in the branch graph.
          from=$(git merge-base "$PR_BASE" "$PR_HEAD")
          pnpm exec commitlint --from "$from" --to "$PR_HEAD"
