on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']

name: ESLint

jobs:
  eslint:
    name: Run ESLint
    runs-on: ubuntu-latest

    # Optional but nice: least privilege
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        env:
          CI: true
        run: npm run lint
