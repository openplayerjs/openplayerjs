on:
  push:
  pull_request:

name: Test + Coveralls

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 26.3.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests (with coverage)
        env:
          CI: true
        run: pnpm run test

      # Coveralls is used for REPORTING only (badge + PR comment). It must never gate
      # the merge: the authoritative, fault-tolerant coverage gate is the jest run above
      # (global 85% floor in jest.config.cjs), which tolerates small coverage decreases.
      #
      # `fail-on-error: false` keeps a Coveralls upload/API hiccup — or its "coverage
      # decreased" comparison status — from failing this job. The Coveralls-posted
      # `coverage/coveralls` commit status should NOT be a required check in branch
      # protection (its "coverage decrease" tolerance is a coveralls.io repo setting, not
      # a repo file). Require the "Test + Coveralls" job instead.
      - name: Upload coverage to Coveralls (report-only, non-blocking)
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          allow-empty: true
          fail-on-error: false
