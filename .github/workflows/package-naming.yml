on:
  pull_request:
    branches: ['**']
    paths:
      - 'packages/*/package.json'

name: Package naming

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check-names:
    name: Enforce @openplayerjs/ prefix
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Verify package name prefix
        run: |
          failed=0
          for pkg in packages/*/package.json; do
            name=$(node -pe "require('./$pkg').name")
            if [[ "$name" != @openplayerjs/* ]]; then
              echo "::error file=$pkg::Package name '$name' must start with '@openplayerjs/'"
              failed=1
            else
              echo "OK  $pkg  →  $name"
            fi
          done
          exit $failed
