name: Renovate

on:
  schedule:
    # Run every hour so dependency updates are picked up as soon as they are published.
    - cron: '0 * * * *'
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: renovatebot/github-action@v46.1.4
        env:
          RENOVATE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
