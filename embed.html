<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="OpenPlayerJS is an ever-green lightweight media player that supports the most common video/audio files for the web, and also VAST/VPAID/VMAP Ads" />
    <meta name="google-site-verification" content="Desj0WKx8CJ5bVxUndGN6WP9k80dxk7fZg0ChsKmIno" />
    <title>OpenPlayerJS - The Lighweight Media Player for Web</title>

    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
    <link rel="icon" href="img/favicon.png" type="image/x-icon">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@openplayerjs/player@latest/dist/openplayer.css" />
    <style>
      body {
        background: #000;
        color: #fff;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      #media {
        width: 100%;
        padding: 20px 0;
      }
    </style>
  </head>

  <body>
    <div id="media"></div>
    <script src="https://cdn.jsdelivr.net/npm/@openplayerjs/player@latest/dist/openplayer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@openplayerjs/hls@latest/dist/openplayer-hls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@openplayerjs/ads@latest/dist/openplayer-ads.js"></script>
    <script>  
      const getUrlParameter = (name) => {
        const search = new URLSearchParams(location.search);
        const result = search.get(name);
        return result ? decodeURIComponent(result.replace(/\+/g, ' ')) : '';
      }

      const type = getUrlParameter('type');
      const ads = getUrlParameter('ads').replace(/~/g, '%');
      const adsType = getUrlParameter('adsType') || 'vast';
      const poster = getUrlParameter('poster').replace(/~/g, '%');

      const defaultMedia =
        'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4';

      const url = decodeURIComponent(getUrlParameter('file')) || defaultMedia;
      const media = document.createElement(type || 'video');
      media.id = 'media-player';
      media.controls = false;
      media.playsinline = true;
      media.src = url;
      if (poster) {
        media.setAttribute('poster', poster);
      }
      media.className = 'op-player__media';

      const mediaContainer = document.getElementById('media');
      mediaContainer.appendChild(media);

      setTimeout(() => {
        const player = new OpenPlayerJS('media-player', {
          ...(ads ? { ads: { debug: true, sources: [{ src: ads, type: adsType.toUpperCase() }] } } : {}),
        });
  
        player.init();
  
        // Report container height to parent after player has rendered,
        // and again whenever the layout changes (e.g. ads overlay appears/hides).
        const postHeight = () => window.parent.postMessage(mediaContainer.offsetHeight, '*');
        new ResizeObserver(postHeight).observe(mediaContainer);
      }, 500);
    </script>
  </body>
</html>
